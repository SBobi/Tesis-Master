services:
  postgres:
    image: postgres:15-alpine
    container_name: kmp_repair_postgres_fullstack
    environment:
      POSTGRES_DB: kmp_repair
      POSTGRES_USER: kmp_repair
      POSTGRES_PASSWORD: kmp_repair_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kmp_repair"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kmp_repair_redis_fullstack
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  default:
    name: kmp_repair_network
    driver: bridge
