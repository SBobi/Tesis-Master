services:
  postgres:
    image: postgres:15-alpine
    container_name: kmp_repair_db
    environment:
      POSTGRES_DB: kmp_repair
      POSTGRES_USER: kmp_repair
      POSTGRES_PASSWORD: kmp_repair_dev
    ports:
      - "5432:5432"
    volumes:
      - kmp_repair_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kmp_repair -d kmp_repair"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: kmp_repair_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  kmp_repair_pgdata:
    name: kmp_repair_pgdata
